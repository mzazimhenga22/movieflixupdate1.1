workflows:
  flutter-workflow:
    name: Build Flutter App with Skia
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # 1) Install Pub dependencies
      - name: Install dependencies
        script: flutter pub get

      # 2) Generate app icons using flutter_launcher_icons
      - name: Generate app icons
        script: flutter pub run flutter_launcher_icons:main

      # 3) Clean any stale build outputs
      - name: Clean previous build artifacts
        script: |
          flutter clean
          rm -rf android/app/build

      # 4) Ensure Gradle JVM args (4.5GB)
      - name: Ensure Gradle JVM args
        script: |
          grep -qxF 'org.gradle.jvmargs=-Xmx4608m' android/gradle.properties \
            || echo 'org.gradle.jvmargs=-Xmx4608m' >> android/gradle.properties

      # 5) Run in profile mode to generate SKSL shader cache
      - name: Warm up SKSL cache
        script: |
          flutter run --profile --enable-software-rendering --no-pub --no-resident \
            --purge-persistent-cache \
            --bundle-sksl-path flutter_01.sksl.json || true

      # 6) Build release APK using the generated SKSL file
      - name: Build APK with Skia
        script: flutter build apk --release --enable-software-rendering \
          --bundle-sksl-path flutter_01.sksl.json

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
