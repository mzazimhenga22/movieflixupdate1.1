workflows:
  flutter-workflow:
    name: Build Flutter App with Skia
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      # 1) Install Pub dependencies
      - name: Install dependencies
        script: flutter pub get

      # 2) Generate app icons using flutter_launcher_icons
      - name: Generate app icons
        script: flutter pub run flutter_launcher_icons:main

      # 3) Clean any stale build outputs
      - name: Clean previous build artifacts
        script: |
          flutter clean
          rm -rf android/app/build

      # 4) Ensure Gradle JVM args (4.5GB)
      - name: Ensure Gradle JVM args
        script: |
          grep -qxF 'org.gradle.jvmargs=-Xmx4608m' android/gradle.properties \
            || echo 'org.gradle.jvmargs=-Xmx4608m' >> android/gradle.properties

      # 5) Precompile and warm up Skia Shaders (SKSL)
      - name: Warm up SKSL cache
        script: flutter run --release --enable-software-rendering --cache-sksl --no-pub --no-resident

      # 6) Build release APK using Skia software rendering
      - name: Build APK with Skia
        script: flutter build apk --release --enable-software-rendering --cache-sksl

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
