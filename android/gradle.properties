# ✅ Increase Gradle heap size to 8GB (for heavy builds like Flutter, NDK, etc.)
org.gradle.jvmargs=-Xmx12288m -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=1G -XX:+HeapDumpOnOutOfMemoryError

# ✅ Enable AndroidX support (required for modern Flutter plugins)
android.useAndroidX=true

# ✅ Automatically migrate support libraries to AndroidX (for legacy dependencies)
android.enableJetifier=true

# ✅ Optional: Use NDK 27 if you're getting NDK-related build errors
android.ndkVersion=27.0.12077973

# ✅ Optional: Speed up builds by enabling parallelism
org.gradle.parallel=true

# ✅ Optional: Enable configuration on demand
org.gradle.configureondemand=true

# ✅ Optional: Use daemon to avoid cold Gradle starts
org.gradle.daemon=true

